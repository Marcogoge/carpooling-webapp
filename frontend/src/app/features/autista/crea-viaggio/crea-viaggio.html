 <div class="page-title">Crea un nuovo viaggio</div>
  <div class="big-form">
    <div class="alert alert-success" *ngIf="messaggio">{{messaggio}}</div>
    <div class="alert alert-error" *ngIf="errore">{{errore}}</div>
 
    <div class="form-row">
      <mat-form-field appearance="outline"><mat-label>Citta di partenza</mat-label><input matInput [(ngModel)]="form.citta_partenza"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Citta di arrivo</mat-label><input matInput [(ngModel)]="form.citta_arrivo"></mat-form-field>
    </div>
 
    <!-- DATE PICKER + ORA SEPARATI: piu intuitivo -->
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Data di partenza</mat-label>
        <input matInput [matDatepicker]="dp" [(ngModel)]="dataObj" placeholder="Seleziona">
        <mat-datepicker-toggle matIconSuffix [for]="dp"></mat-datepicker-toggle>
        <mat-datepicker #dp></mat-datepicker>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Ora di partenza</mat-label>
        <input matInput type="time" [(ngModel)]="ora">
      </mat-form-field>
    </div>
 
    <div class="form-row">
      <mat-form-field appearance="outline"><mat-label>Durata stimata (min)</mat-label><input matInput type="number" [(ngModel)]="form.tempo_stimato"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Contributo EUR</mat-label><input matInput type="number" [(ngModel)]="form.contributo"></mat-form-field>
    </div>
 
    <div class="form-row">
      <mat-form-field appearance="outline"><mat-label>Posti disponibili</mat-label><input matInput type="number" [(ngModel)]="form.posti_max"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Soste (opzionale)</mat-label><input matInput [(ngModel)]="form.soste"></mat-form-field>
    </div>
 
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <mat-form-field appearance="outline"><mat-label>Marca auto</mat-label><input matInput [(ngModel)]="form.marca_auto"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Modello</mat-label><input matInput [(ngModel)]="form.modello_auto"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Targa</mat-label><input matInput [(ngModel)]="form.targa_auto"></mat-form-field>
    </div>
 
    <div class="checkboxes">
      <label class="check-item"><input type="checkbox" [(ngModel)]="form.bagaglio"> Bagaglio ammesso</label>
      <label class="check-item"><input type="checkbox" [(ngModel)]="form.animali"> Animali ammessi</label>
    </div>
 
    <div style="display:flex;gap:10px;margin-top:20px">
      <button mat-raised-button color="primary" (click)="crea()" [disabled]="caricamento">
        {{caricamento?'Creazione...':'Crea viaggio'}}
      </button>
      <button mat-button routerLink="/autista/dashboard">Annulla</button>
    </div>
  </div>
