  <div class="pagina">
    <h2>Crea un nuovo viaggio</h2>
    <mat-card>
      <mat-card-content>
        <p class="successo" *ngIf="messaggio">{{messaggio}}</p>
        <p class="errore" *ngIf="errore">{{errore}}</p>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Citta di partenza</mat-label>
          <input matInput [(ngModel)]="form.citta_partenza">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Citta di arrivo</mat-label>
          <input matInput [(ngModel)]="form.citta_arrivo">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Data e ora partenza</mat-label>
          <input matInput type="datetime-local" [(ngModel)]="form.data_ora_partenza">
        </mat-form-field>
        <mat-form-field appearance="outline" class="half">
          <mat-label>Durata stimata (min)</mat-label>
          <input matInput type="number" [(ngModel)]="form.tempo_stimato">
        </mat-form-field>
        <mat-form-field appearance="outline" class="half">
          <mat-label>Contributo EUR</mat-label>
          <input matInput type="number" [(ngModel)]="form.contributo">
        </mat-form-field>
        <mat-form-field appearance="outline" class="half">
          <mat-label>Posti disponibili</mat-label>
          <input matInput type="number" [(ngModel)]="form.posti_max">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Soste (opzionale)</mat-label>
          <input matInput [(ngModel)]="form.soste">
        </mat-form-field>
        <mat-form-field appearance="outline" class="third">
          <mat-label>Marca auto</mat-label>
          <input matInput [(ngModel)]="form.marca_auto">
        </mat-form-field>
        <mat-form-field appearance="outline" class="third">
          <mat-label>Modello</mat-label>
          <input matInput [(ngModel)]="form.modello_auto">
        </mat-form-field>
        <mat-form-field appearance="outline" class="third">
          <mat-label>Targa</mat-label>
          <input matInput [(ngModel)]="form.targa_auto">
        </mat-form-field>
        <div class="checkboxes">
          <label>
            <input type="checkbox" [(ngModel)]="form.bagaglio">
            Bagaglio ammesso
          </label>
          <label>
            <input type="checkbox" [(ngModel)]="form.animali">
            Animali ammessi
          </label>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary"
                (click)="crea()" [disabled]="caricamento">
          <mat-spinner *ngIf="caricamento" diameter="20"></mat-spinner>
          <span *ngIf="!caricamento">Crea Viaggio</span>
        </button>
        <button mat-button routerLink="/autista/dashboard">Annulla</button>
      </mat-card-actions>
    </mat-card>
  </div>
