  <div class="page-header">
    <div class="page-title" style="margin-bottom:0">I tuoi viaggi</div>
    <button mat-raised-button color="primary" routerLink="/autista/crea-viaggio">+ Nuovo viaggio</button>
  </div>
  <mat-spinner *ngIf="caricamento" diameter="32" style="margin:40px auto"></mat-spinner>
  <div *ngIf="!caricamento&&viaggi.length===0" class="empty">
    <p>Non hai ancora creato nessun viaggio.</p>
    <button mat-raised-button color="primary" routerLink="/autista/crea-viaggio">Crea il primo</button>
  </div>
  <div *ngFor="let v of viaggi" class="trip-card">
    <div class="trip-route"><span>{{v.citta_partenza}}</span><span class="trip-arrow">&#8594;</span><span>{{v.citta_arrivo}}</span></div>
    <div class="trip-meta" style="margin-bottom:14px">
      <span class="chip">{{v.data_ora_partenza|date:'dd MMM yyyy, HH:mm'}}</span>
      <span class="chip chip-green">{{v.posti_disponibili}}/{{v.posti_max}} posti</span>
      <span class="chip chip-yellow" *ngIf="v.prenotazioni_in_attesa>0">{{v.prenotazioni_in_attesa}} in attesa</span>
      <span class="chip chip-blue">EUR {{v.contributo}}</span>
    </div>
    <div style="display:flex;gap:8px">
      <button mat-stroked-button color="primary" (click)="vaiPrenotazioni(v.id_viaggio)">Prenotazioni</button>
      <button mat-stroked-button color="warn" (click)="elimina(v.id_viaggio)">Elimina</button>
    </div>
  </div>
