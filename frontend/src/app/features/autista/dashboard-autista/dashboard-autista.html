  <div class="contenuto">
    <div class="page-header">
      <div class="pagina-titolo" style="margin-bottom:0">
        I tuoi viaggi
      </div>
      <button mat-raised-button color="primary"
              routerLink="/autista/crea-viaggio">
        + Nuovo viaggio
      </button>
    </div>
 
    <mat-spinner *ngIf="caricamento" diameter="36"
                 style="margin:40px auto"></mat-spinner>
 
    <div *ngIf="!caricamento && viaggi.length===0" class="empty">
      <p>Non hai ancora creato nessun viaggio.</p>
      <button mat-raised-button color="primary"
              routerLink="/autista/crea-viaggio">
        Crea il tuo primo viaggio
      </button>
    </div>
 
    <div *ngFor="let v of viaggi" class="viaggio-card">
      <div class="card-rotta">
        <span>{{v.citta_partenza}}</span>
        <span class="freccia">&#8594;</span>
        <span>{{v.citta_arrivo}}</span>
      </div>
      <div class="card-meta" style="margin-bottom:14px">
        <span class="chip">
          {{v.data_ora_partenza | date:'dd MMM yyyy, HH:mm'}}
        </span>
        <span class="chip chip-green">
          {{v.posti_disponibili}}/{{v.posti_max}} posti
        </span>
        <span class="chip chip-yellow"
              *ngIf="v.prenotazioni_in_attesa > 0">
          {{v.prenotazioni_in_attesa}} in attesa
        </span>
        <span class="chip chip-blue">EUR {{v.contributo}}</span>
      </div>
      <div style="display:flex; gap:8px">
        <button mat-stroked-button color="primary"
                (click)="vaiPrenotazioni(v.id_viaggio)">
          Gestisci prenotazioni
        </button>
        <button mat-stroked-button color="warn"
                (click)="elimina(v.id_viaggio)">
          Elimina
        </button>
      </div>
    </div>
  </div>
