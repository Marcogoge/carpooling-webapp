  <div class="pagina">
    <h2>Le tue prenotazioni, {{utente?.nome}}</h2>
    <p *ngIf="prenotazioni.length===0">
      Nessuna prenotazione.
      <a routerLink="/passeggero/cerca">Cerca un viaggio!</a>
    </p>
    <mat-card *ngFor="let p of prenotazioni" class="prenotazione-card">
      <mat-card-header>
        <mat-card-title>{{p.citta_partenza}} -> {{p.citta_arrivo}}</mat-card-title>
        <mat-card-subtitle>
          {{p.data_ora_partenza | date:'dd/MM/yyyy HH:mm'}}
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>Autista: {{p.nome_autista}} {{p.cog_autista}}</p>
        <p>Contributo: EUR {{p.contributo}}</p>
        <p>Stato: <strong
             [style.color]="p.stato==='accettata' ? 'green' :
                            p.stato==='rifiutata'  ? 'red'   : 'orange'">
            {{p.stato}}
          </strong></p>
      </mat-card-content>
    </mat-card>
  </div>
