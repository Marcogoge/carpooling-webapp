  <div class="form-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Registrati come Passeggero</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="successo" *ngIf="messaggio">{{messaggio}}</p>
        <p class="errore" *ngIf="errore">{{errore}}</p>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nome</mat-label>
          <input matInput [(ngModel)]="form.nome">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Cognome</mat-label>
          <input matInput [(ngModel)]="form.cognome">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Documento di Identita</mat-label>
          <input matInput [(ngModel)]="form.documento_identita">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Telefono</mat-label>
          <input matInput [(ngModel)]="form.telefono">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="form.email">
        </mat-form-field>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary"
                (click)="registra()" [disabled]="caricamento">
          <mat-spinner *ngIf="caricamento" diameter="20"></mat-spinner>
          <span *ngIf="!caricamento">Registrati</span>
        </button>
        <a mat-button routerLink="/registra-autista">Sei un autista?</a>
      </mat-card-actions>
    </mat-card>
  </div>
